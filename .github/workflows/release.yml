# ─────────────────────────────────────────────────────────────
# 发版 + 自动更新产物发布（Windows）
# 打一个 v* 标签（如 v0.1.1）推上来，就会在 Windows runner 上构建、
# 用更新私钥（minisign）签名，并把 NSIS 安装包 + .sig + latest.json 上传到同一个 GitHub Release。
# 应用端从 releases/latest/download/latest.json 检查更新，对上 pubkey 即可自动升级。
#
#   Windows → NSIS 安装包 (ZhiTouGu_<ver>_x64-setup.exe) + .sig + latest.json
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY           = 更新私钥文件全文（单行）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = 私钥密码
#   POLARIS_GIFT_MINIMAX_KEY            =（可选）「粉丝福利」MiniMax key；缺省则礼物功能无 key，不影响构建
#
# 应用是单平台（Windows / nsis），单个构建 job 不会出现多平台并行 clobber latest.json 的坑，
# 故无需额外的合并清单 job —— tauri-action 自己上传的 latest.json 即可用。
# ─────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: polaris-app/src-tauri

      - name: Install frontend deps
        working-directory: polaris-app
        run: npm install

      # 内置 Python 运行时 + 依赖(akshare/pandas/numpy) + data-pipeline 源码 → 打进安装包资源。
      # 用户机器开箱即用，无需自装 Python。详见 scripts/prepare_pyruntime.ps1 与 tauri.conf bundle.resources。
      - name: Stage bundled Python runtime + pipeline
        shell: pwsh
        run: ./scripts/prepare_pyruntime.ps1

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          POLARIS_GIFT_MINIMAX_KEY: ${{ secrets.POLARIS_GIFT_MINIMAX_KEY }}
        with:
          projectPath: polaris-app
          tagName: ${{ github.ref_name }}
          releaseName: "智投顾 ${{ github.ref_name }}"
          releaseBody: "查看 CHANGELOG 或提交记录了解本次更新内容。"
          releaseDraft: false
          prerelease: false
          # --config 仅在打包时注入内置 Python/管线资源；主 tauri.conf 保持 resources:[] 以免破坏 dev/check。
          args: "--bundles nsis --config src-tauri/tauri.bundle-python.conf.json"

      # 兜底:tauri-action 偶发 "Signature not found for the updater JSON. Skipping upload..."(用 --config 打包时
      # 它找不到 .sig 来生成清单)。若 release 缺 latest.json,这里从 .sig 现造一份上传,保证远程更新端点永不 404。
      - name: Ensure latest.json (fallback)
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $names = gh release view $tag --json assets --jq '.assets[].name'
          if ($names -match 'latest\.json') { Write-Host "latest.json 已存在,跳过"; exit 0 }
          $sigFile = Get-ChildItem polaris-app/src-tauri/target/release/bundle/nsis/*.sig -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sigFile) { Write-Error "未找到 .sig,无法生成 latest.json"; exit 1 }
          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          $exeUrl = gh release view $tag --json assets --jq '.assets[] | select(.name|endswith(\".exe\")) | .url'
          $ver = $tag.TrimStart('v')
          $obj = [ordered]@{
            version  = $ver
            notes    = "智投顾 $ver 自动更新"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{ "windows-x86_64" = [ordered]@{ signature = $sig; url = $exeUrl } }
          }
          $json = $obj | ConvertTo-Json -Depth 6
          [System.IO.File]::WriteAllText("$PWD/latest.json", $json, (New-Object System.Text.UTF8Encoding $false))
          gh release upload $tag latest.json --clobber
          Write-Host "[OK] latest.json 已生成并上传 → 远程更新端点可达"
