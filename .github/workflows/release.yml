# ─────────────────────────────────────────────────────────────────────────────
# 发版 + 自动更新产物发布（Windows + macOS 双平台）
# 打一个 v* 标签推上来，就会在 matrix 里同时构建：
#   • Windows → NSIS 安装包 (ZhiTouGu_<ver>_x64-setup.exe) + .sig
#   • macOS Apple Silicon → .app.tar.gz (ZhiTouGu_<ver>_aarch64.app.tar.gz) + .sig
#   • macOS Intel → .app.tar.gz (ZhiTouGu_<ver>_x86_64.app.tar.gz) + .sig
# 构建产物全部上传到同一个 GitHub Release，最后由 combine-latest-json job
# 合并三份签名，生成包含 windows-x86_64 / darwin-aarch64 / darwin-x86_64 的 latest.json。
#
# 应用端从 releases/latest/download/latest.json 检查更新，对上 pubkey 即可自动升级。
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY           = 更新私钥文件全文（单行）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = 私钥密码
#   POLARIS_GIFT_MINIMAX_KEY            =（可选）「粉丝福利」MiniMax key；缺省则礼物功能无 key，不影响构建
#
# macOS 采用 ad-hoc 签名(signingIdentity="-")，无需 Apple 开发者证书；
# 但未经公证(notarize)，首次打开会被 Gatekeeper 拦截，Release notes 里会提示用户
# 「系统设置 → 隐私与安全性 → 仍要打开」或执行 `xattr -cr /Applications/ZhiTouGu.app`。
# ─────────────────────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── 先创建 Release，拿到 release_id，避免 matrix 每个 job 都尝试创建/覆盖 ──
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          notes=$(printf '%s\n\n%s' \
            '查看 CHANGELOG 或提交记录了解本次更新内容。' \
            'macOS 用户首次打开若被 Gatekeeper 拦截，请在「系统设置 → 隐私与安全性」中点击「仍要打开」，或在终端执行：xattr -cr /Applications/ZhiTouGu.app')
          # 幂等：若 Release 已存在（例如重跑 workflow），直接复用
          gh release create "$tag" \
            --title "智投顾 $tag" \
            --notes "$notes" \
            --draft=false \
            --prerelease=false || true
          release_id=$(gh release view "$tag" --json id -q '.id')
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  # ── 三平台并行构建、签名、上传 ──
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: app
          - platform: macos-13
            target: x86_64-apple-darwin
            bundle: app
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: polaris-app/src-tauri

      - name: Install frontend deps
        working-directory: polaris-app
        run: npm install

      # 内置 Python 运行时 + 依赖(akshare/pandas/numpy) + data-pipeline 源码 → 打进安装包资源。
      # 用户机器开箱即用，无需自装 Python。详见 scripts/prepare_pyruntime.* 与 tauri.conf bundle.resources。
      - name: Stage bundled Python runtime + pipeline (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./scripts/prepare_pyruntime.ps1

      - name: Stage bundled Python runtime + pipeline (macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: bash ./scripts/prepare_pyruntime.sh 20241016 3.12.7 ${{ matrix.target }}

      - name: Build, sign & upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          POLARIS_GIFT_MINIMAX_KEY: ${{ secrets.POLARIS_GIFT_MINIMAX_KEY }}
        with:
          projectPath: polaris-app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: "--bundles ${{ matrix.bundle }} --target ${{ matrix.target }} --config src-tauri/tauri.bundle-python.conf.json"

  # ── 等 matrix 全部跑完，把三平台 .sig 合并成一份 latest.json 上传到 Release ──
  combine-latest-json:
    needs: [create-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          ver="${tag#v}"

          # 下载所有 .sig 文件到临时目录
          tmp=$(mktemp -d)
          gh release view "$tag" --json assets --jq '.assets[] | select(.name | endswith(".sig")) | .url' | \
            while read -r url; do
              name=$(basename "$url")
              curl -sL "$url" -o "$tmp/$name"
            done

          # 辅助：取某类资源的 browser_download_url
          asset_url() {
            gh release view "$tag" --json assets --jq ".assets[] | select(.name | $1) | .url"
          }

          # 辅助：读对应 .sig 内容
          read_sig() {
            local sig_name="$1.sig"
            if [ -f "$tmp/$sig_name" ]; then
              cat "$tmp/$sig_name"
            else
              echo ""
            fi
          }

          win_url=$(asset_url 'endswith("_x64-setup.exe")')
          win_sig=$(read_sig "$(basename "$win_url")")

          arm_url=$(asset_url 'endswith("_aarch64.app.tar.gz")')
          arm_sig=$(read_sig "$(basename "$arm_url")")

          x64_url=$(asset_url 'endswith("_x86_64.app.tar.gz")')
          x64_sig=$(read_sig "$(basename "$x64_url")")

          # 任一平台缺签名都报错，避免发出缺胳膊少腿的 latest.json
          if [ -z "$win_sig" ] || [ -z "$arm_sig" ] || [ -z "$x64_sig" ]; then
            echo "[ERROR] 缺失签名：win=${win_sig:+OK} arm=${arm_sig:+OK} x64=${x64_sig:+OK}"
            exit 1
          fi

          jq -n \
            --arg version "$ver" \
            --arg notes "智投顾 $ver 自动更新" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$win_sig" --arg win_url "$win_url" \
            --arg arm_sig "$arm_sig" --arg arm_url "$arm_url" \
            --arg x64_sig "$x64_sig" --arg x64_url "$x64_url" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $arm_sig, url: $arm_url },
                "darwin-x86_64": { signature: $x64_sig, url: $x64_url }
              }
            }' > latest.json

          gh release upload "$tag" latest.json --clobber
          echo "[OK] latest.json 已合并上传（windows-x86_64 / darwin-aarch64 / darwin-x86_64）"
