# ─────────────────────────────────────────────────────────────
# macOS 安装包(.dmg)按需构建 —— 手动触发,产物作为 workflow artifact 下载(不发公开 Release)
#
# 触发：gh workflow run build-mac.yml   或 GitHub 网页 Actions → build-mac → Run workflow
# 产物：智投顾 .dmg(Apple Silicon + Intel 各一),在 run 的 Artifacts 里下载。
# 说明：app 采用 ad-hoc 签名(tauri.conf signingIdentity "-")，无需 Apple 开发者证书即可构建；
#       下载后首次打开需「右键 → 打开」绕过 Gatekeeper(未公证)。
# ─────────────────────────────────────────────────────────────
name: build-mac

on:
  workflow_dispatch:

jobs:
  build-mac:
    permissions:
      contents: read
    # 仅 Apple Silicon(arm64)——覆盖 2020 年后全部 Mac。
    # 注：Intel(x86_64)dmg 在 CI 上 ad-hoc codesign("-")会报 "code object is not signed at all"
    #     (macos-13 已知签名顽疾),如确需 Intel 版需配 Apple 开发者证书签名,故暂只出 arm64。
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: polaris-app/src-tauri

      - name: Install frontend deps
        working-directory: polaris-app
        run: npm install

      - name: Build dmg
        working-directory: polaris-app
        # 关掉更新产物(createUpdaterArtifacts)以免依赖签名密钥;dmg 自身用 ad-hoc 签名即可。
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles dmg --config "{\"bundle\":{\"createUpdaterArtifacts\":false}}"

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhitougu-dmg-${{ matrix.arch }}
          path: polaris-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
